<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseCRM — для таргетолога, SMM и дизайнера</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    ::-webkit-scrollbar { height: 8px; width: 8px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    [draggable=true] { cursor: grab; }
    .drag-over { background: rgba(124,58,237,.06); border-color: #c4b5fd !important; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 -translate-x-full transform border-r border-slate-100 bg-white transition-transform lg:static lg:translate-x-0">
      <div class="flex h-16 items-center gap-2.5 border-b border-slate-100 px-6">
        <div class="flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-violet-500 to-indigo-600 shadow-lg shadow-indigo-200">
          <svg class="h-5 w-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 3v18h18"/><path d="m7 14 4-4 4 4 5-5"/></svg>
        </div>
        <span class="text-lg font-bold tracking-tight">Pulse<span class="text-violet-600">CRM</span></span>
      </div>
      <nav id="nav" class="space-y-1 p-4"></nav>
      <div class="absolute inset-x-4 bottom-4">
        <button onclick="resetData()" class="flex w-full items-center justify-center gap-2 rounded-xl border border-slate-200 px-3 py-2.5 text-sm font-medium text-slate-500 transition hover:bg-slate-50 hover:text-slate-700">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          Сбросить данные
        </button>
      </div>
    </aside>
    <div id="overlay" onclick="toggleMenu(false)" class="fixed inset-0 z-30 hidden bg-slate-900/30 lg:hidden"></div>

    <!-- Main -->
    <div class="flex min-w-0 flex-1 flex-col">
      <header class="sticky top-0 z-20 flex h-16 items-center justify-between border-b border-slate-100 bg-white/80 px-5 backdrop-blur lg:px-8">
        <div class="flex items-center gap-3">
          <button onclick="toggleMenu(true)" class="rounded-lg p-1.5 text-slate-500 hover:bg-slate-100 lg:hidden">
            <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <div>
            <h1 id="pageTitle" class="text-lg font-bold text-slate-900">Обзор</h1>
            <p class="hidden text-xs text-slate-400 sm:block">CRM для таргетолога, SMM-специалиста и дизайнера</p>
          </div>
        </div>
        <div class="relative flex items-center gap-2" id="notifWrap">
          <button onclick="toggleNotif()" class="relative rounded-lg p-2 text-slate-500 transition hover:bg-slate-100">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span id="notifBadge" class="absolute right-0.5 top-0.5 hidden h-4 min-w-4 items-center justify-center rounded-full bg-rose-500 px-1 text-[10px] font-bold text-white"></span>
          </button>
          <div id="notifPanel" class="absolute right-0 top-12 z-30 hidden w-80 overflow-hidden rounded-2xl border border-slate-100 bg-white shadow-xl shadow-slate-200/60"></div>
        </div>
      </header>

      <main id="main" class="flex-1 p-5 lg:p-8"></main>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="relative z-10 w-full max-w-lg overflow-hidden rounded-2xl bg-white shadow-2xl">
      <div class="flex items-center justify-between border-b border-slate-100 px-6 py-4">
        <h3 id="modalTitle" class="text-lg font-semibold text-slate-900"></h3>
        <button onclick="closeModal()" class="rounded-lg p-1 text-slate-400 transition hover:bg-slate-100 hover:text-slate-700">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="modalBody" class="px-6 py-5"></div>
    </div>
  </div>

<script>
/* ============ ДАННЫЕ ============ */
const KEY = "crm-data-standalone-v1";
const COLORS = ["#7c3aed","#4f46e5","#0ea5e9","#10b981","#f59e0b","#ef4444","#ec4899","#14b8a6"];
const STAGES = [
  { id:"lead", label:"Новый лид", color:"#a78bfa" },
  { id:"qualified", label:"Квалификация", color:"#818cf8" },
  { id:"proposal", label:"Предложение", color:"#60a5fa" },
  { id:"negotiation", label:"Переговоры", color:"#fbbf24" },
  { id:"won", label:"Сделка закрыта", color:"#34d399" },
  { id:"lost", label:"Проиграна", color:"#fb7185" },
];
const uid = () => Math.random().toString(36).slice(2,10);
const D = 86400000, H = 3600000;

function seed(){
  const now = Date.now();
  return {
    customers:[
      { id:"c1", name:"Анна Соколова", company:"Студия маникюра «Лак»", email:"anna@lak-nails.ru", phone:"+7 912 345-67-89", avatarColor:COLORS[0], status:"active", tags:["Таргет","Beauty"], createdAt:now-D*40 },
      { id:"c2", name:"Игорь Петров", company:"Кофейня «Бариста»", email:"igor@barista.ru", phone:"+7 921 111-22-33", avatarColor:COLORS[1], status:"lead", tags:["SMM","HoReCa"], createdAt:now-D*30 },
      { id:"c3", name:"Мария Климова", company:"Онлайн-школа English Pro", email:"maria@englishpro.ru", phone:"+7 905 765-43-21", avatarColor:COLORS[2], status:"active", tags:["Таргет","EdTech"], createdAt:now-D*22 },
      { id:"c4", name:"Дмитрий Орлов", company:"Фитнес-клуб PowerGym", email:"d.orlov@powergym.ru", phone:"+7 916 888-99-00", avatarColor:COLORS[3], status:"lead", tags:["SMM","VIP"], createdAt:now-D*15 },
      { id:"c5", name:"Елена Васнецова", company:"Бренд одежды NORDA", email:"elena@norda.ru", phone:"+7 903 222-33-44", avatarColor:COLORS[4], status:"inactive", tags:["Дизайн","Fashion"], createdAt:now-D*60 },
      { id:"c6", name:"Сергей Зайцев", company:"Доставка цветов FLOWERS", email:"sergey@flowers.ru", phone:"+7 917 555-66-77", avatarColor:COLORS[5], status:"active", tags:["Дизайн","Таргет"], createdAt:now-D*8 },
    ],
    deals:[
      { id:"d1", title:"Ведение таргета на 3 месяца", customerId:"c1", amount:90000, stage:"negotiation", probability:70, closeDate:"2026-03-15", createdAt:now-D*20 },
      { id:"d2", title:"SMM-ведение Instagram + Reels", customerId:"c2", amount:45000, stage:"proposal", probability:50, closeDate:"2026-03-28", createdAt:now-D*12 },
      { id:"d3", title:"Запуск рекламы + лендинг в Figma", customerId:"c3", amount:120000, stage:"won", probability:100, closeDate:"2026-02-10", createdAt:now-D*18 },
      { id:"d4", title:"Аудит соцсетей и контент-план", customerId:"c4", amount:25000, stage:"qualified", probability:35, closeDate:"2026-04-05", createdAt:now-D*6 },
      { id:"d5", title:"Дизайн постов на месяц (Figma)", customerId:"c6", amount:30000, stage:"lead", probability:15, closeDate:"2026-04-20", createdAt:now-D*3 },
      { id:"d6", title:"Настройка рекламы ВКонтакте", customerId:"c1", amount:35000, stage:"won", probability:100, closeDate:"2026-01-25", createdAt:now-D*35 },
      { id:"d7", title:"Разовый дизайн баннеров", customerId:"c5", amount:12000, stage:"lost", probability:0, closeDate:"2026-01-12", createdAt:now-D*50 },
      { id:"d8", title:"Редизайн сайта в Figma", customerId:"c3", amount:85000, stage:"proposal", probability:55, closeDate:"2026-05-01", createdAt:now-D*4 },
    ],
    tasks:[
      { id:"t1", title:"Подготовить креативы для таргета «Лак»", customerId:"c1", dueDate:"2026-03-02", priority:"high", done:false, createdAt:now },
      { id:"t2", title:"Составить контент-план для кофейни", customerId:"c2", dueDate:"2026-03-01", priority:"high", done:false, createdAt:now },
      { id:"t3", title:"Сверстать макет лендинга в Figma", customerId:"c4", dueDate:"2026-03-05", priority:"medium", done:false, createdAt:now },
      { id:"t4", title:"Выставить счёт English Pro", customerId:"c3", dueDate:"2026-02-28", priority:"medium", done:true, createdAt:now },
      { id:"t5", title:"Снять отчёт по рекламе FLOWERS", customerId:"c6", dueDate:"2026-03-08", priority:"low", done:false, createdAt:now },
    ],
    activities:[
      { id:"a1", type:"deal", text:"Сделка «Запуск рекламы + лендинг в Figma» закрыта успешно", at:now-H*2 },
      { id:"a2", type:"customer", text:"Добавлен новый клиент: Доставка цветов FLOWERS", at:now-H*8 },
      { id:"a3", type:"task", text:"Задача «Выставить счёт English Pro» выполнена", at:now-H*26 },
      { id:"a4", type:"deal", text:"Сделка «Редизайн сайта в Figma» перешла в «Предложение»", at:now-H*48 },
    ],
  };
}

let db;
function load(){
  try { const raw = localStorage.getItem(KEY); if(raw){ db = JSON.parse(raw); return; } } catch(e){}
  db = seed(); save();
}
function save(){ localStorage.setItem(KEY, JSON.stringify(db)); }
function addActivity(type, text){ db.activities.unshift({ id:uid(), type, text, at:Date.now() }); db.activities = db.activities.slice(0,30); }
function resetData(){ localStorage.removeItem(KEY); load(); seenAt = 0; localStorage.setItem("crm-seen-standalone","0"); render(); }

/* ============ ХЕЛПЕРЫ ============ */
const fmtMoney = n => new Intl.NumberFormat("ru-RU",{ style:"currency", currency:"RUB", maximumFractionDigits:0 }).format(n);
const fmtDate = s => new Date(s).toLocaleDateString("ru-RU",{ day:"2-digit", month:"short", year:"numeric" });
function timeAgo(t){ const h=Math.floor((Date.now()-t)/H); if(h<1) return "только что"; if(h<24) return h+" ч назад"; return Math.floor(h/24)+" дн назад"; }
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
function avatar(name,color,size=40){ const ini=name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase(); return `<div class="flex shrink-0 items-center justify-center rounded-full font-semibold text-white" style="background:${color};width:${size}px;height:${size}px;font-size:${size*0.38}px">${ini}</div>`; }
const cust = id => db.customers.find(c=>c.id===id);

/* ============ СОСТОЯНИЕ UI ============ */
let page = "dashboard";
let custFilter = "all", custQuery = "";
let taskTab = "open";
let seenAt = Number(localStorage.getItem("crm-seen-standalone") || 0);
let dragId = null;
let revenueChart = null, funnelChart = null;

const NAV = [
  { id:"dashboard", label:"Дашборд", icon:"M3 13h8V3H3v10Zm0 8h8v-6H3v6Zm10 0h8V11h-8v10Zm0-18v6h8V3h-8Z" },
  { id:"customers", label:"Клиенты", icon:"M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm14 10v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" },
  { id:"deals", label:"Сделки", icon:"M3 3v18h18M7 14l4-4 4 4 5-5" },
  { id:"tasks", label:"Задачи", icon:"M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" },
];
const TITLES = { dashboard:"Обзор", customers:"Клиенты", deals:"Воронка продаж", tasks:"Задачи" };
const INPUT = "w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-900 outline-none transition focus:border-violet-400 focus:ring-2 focus:ring-violet-100";

/* ============ НАВИГАЦИЯ ============ */
function renderNav(){
  document.getElementById("nav").innerHTML = NAV.map(n=>`
    <button onclick="goto('${n.id}')" class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition ${page===n.id?'bg-gradient-to-br from-violet-600 to-indigo-600 text-white shadow-sm shadow-indigo-200':'text-slate-600 hover:bg-slate-50'}">
      <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${n.icon}"/></svg>${n.label}
    </button>`).join("");
}
function goto(p){ page=p; toggleMenu(false); render(); }
function toggleMenu(open){
  const sb=document.getElementById("sidebar"), ov=document.getElementById("overlay");
  if(open){ sb.classList.remove("-translate-x-full"); ov.classList.remove("hidden"); }
  else { sb.classList.add("-translate-x-full"); ov.classList.add("hidden"); }
}

/* ============ УВЕДОМЛЕНИЯ ============ */
function renderNotifBadge(){
  const unread = db.activities.filter(a=>a.at>seenAt).length;
  const b=document.getElementById("notifBadge");
  if(unread>0){ b.textContent=unread; b.classList.remove("hidden"); b.classList.add("flex"); }
  else { b.classList.add("hidden"); b.classList.remove("flex"); }
}
function notifIcon(t){ return t==="deal"?"💼":t==="customer"?"👤":t==="task"?"✅":"📝"; }
function toggleNotif(){
  const p=document.getElementById("notifPanel");
  const willOpen = p.classList.contains("hidden");
  if(willOpen){
    p.innerHTML = `
      <div class="flex items-center justify-between border-b border-slate-100 px-4 py-3">
        <span class="text-sm font-semibold text-slate-800">Уведомления</span>
        <span class="rounded-full bg-violet-50 px-2 py-0.5 text-xs font-medium text-violet-600">${db.activities.length}</span>
      </div>
      <div class="max-h-96 overflow-y-auto">
        ${db.activities.length===0?'<div class="px-4 py-10 text-center text-sm text-slate-400">Нет уведомлений</div>':
        db.activities.map(a=>`
          <div class="flex items-start gap-3 border-b border-slate-50 px-4 py-3 transition last:border-0 hover:bg-slate-50">
            <div class="mt-0.5 flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-violet-50 text-sm">${notifIcon(a.type)}</div>
            <div class="min-w-0 flex-1"><p class="text-sm leading-snug text-slate-700">${esc(a.text)}</p><p class="mt-0.5 text-xs text-slate-400">${timeAgo(a.at)}</p></div>
          </div>`).join("")}
      </div>`;
    p.classList.remove("hidden");
    seenAt = Date.now(); localStorage.setItem("crm-seen-standalone", String(seenAt)); renderNotifBadge();
  } else { p.classList.add("hidden"); }
}
document.addEventListener("mousedown", e=>{
  const w=document.getElementById("notifWrap");
  if(w && !w.contains(e.target)) document.getElementById("notifPanel").classList.add("hidden");
});

/* ============ МОДАЛКА ============ */
function openModal(title, bodyHtml){
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = bodyHtml;
  const m=document.getElementById("modal"); m.classList.remove("hidden"); m.classList.add("flex");
}
function closeModal(){ const m=document.getElementById("modal"); m.classList.add("hidden"); m.classList.remove("flex"); }
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });
function field(label, inner){ return `<label class="block"><span class="mb-1.5 block text-sm font-medium text-slate-700">${label}</span>${inner}</label>`; }
function val(id){ return document.getElementById(id).value; }

/* ============ ДАШБОРД ============ */
const revenueData = [["Сен",85],["Окт",110],["Ноя",95],["Дек",130],["Янв",145],["Фев",180]];
function statCard(label,value,sub,icon,accent,hint){
  return `<div class="group relative rounded-2xl border border-slate-100 bg-white p-5 shadow-sm">
    <div class="flex items-start justify-between">
      <div class="flex h-11 w-11 items-center justify-center rounded-xl text-xl" style="background:${accent}1a">${icon}</div>
      <span class="text-xs font-medium text-emerald-600">${sub}</span>
    </div>
    <div class="mt-4 text-2xl font-bold text-slate-900">${value}</div>
    <div class="flex items-center gap-1 text-sm text-slate-500">${label}
      <span class="relative">
        <svg class="h-3.5 w-3.5 cursor-help text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        <span class="pointer-events-none absolute bottom-5 left-1/2 z-10 w-48 -translate-x-1/2 rounded-lg bg-slate-800 px-3 py-2 text-xs font-normal leading-snug text-white opacity-0 shadow-lg transition group-hover:opacity-100">${hint}</span>
      </span>
    </div></div>`;
}
function renderDashboard(){
  const won = db.deals.filter(d=>d.stage==="won");
  const totalRevenue = won.reduce((s,d)=>s+d.amount,0);
  const open = db.deals.filter(d=>d.stage!=="won"&&d.stage!=="lost");
  const pipeline = open.reduce((s,d)=>s+d.amount,0);
  const closed = db.deals.filter(d=>d.stage==="won"||d.stage==="lost");
  const winRate = closed.length?Math.round(won.length/closed.length*100):0;
  const topClients = db.customers.map(c=>({c,total:db.deals.filter(d=>d.customerId===c.id&&d.stage==="won").reduce((s,d)=>s+d.amount,0)})).sort((a,b)=>b.total-a.total).slice(0,5);

  document.getElementById("main").innerHTML = `
    <div class="space-y-6">
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
        ${statCard("Заработано",fmtMoney(totalRevenue),"+12.5%","💰","#10b981","Сумма всех завершённых сделок со статусом «Сделка закрыта»")}
        ${statCard("В работе",fmtMoney(pipeline),"+8.2%","📊","#7c3aed","Сумма активных сделок, которые ещё в воронке")}
        ${statCard("Клиентов",String(db.customers.length),"+3 за месяц","👥","#0ea5e9","Общее количество клиентов в базе")}
        ${statCard("Конверсия",winRate+"%","win rate","🎯","#f59e0b","Доля выигранных сделок среди всех завершённых")}
      </div>
      <div class="grid grid-cols-1 gap-6 lg:grid-cols-3">
        <div class="rounded-2xl border border-slate-100 bg-white p-6 shadow-sm lg:col-span-2">
          <div class="mb-4 flex items-center justify-between"><h3 class="font-semibold text-slate-900">Динамика дохода</h3><span class="text-sm text-slate-400">тыс. ₽</span></div>
          <div style="height:260px"><canvas id="revChart"></canvas></div>
        </div>
        <div class="rounded-2xl border border-slate-100 bg-white p-6 shadow-sm">
          <h3 class="mb-4 font-semibold text-slate-900">Воронка по этапам</h3>
          <div style="height:260px"><canvas id="funnelChart"></canvas></div>
        </div>
      </div>
      <div class="grid grid-cols-1 gap-6 lg:grid-cols-3">
        <div class="rounded-2xl border border-slate-100 bg-white p-6 shadow-sm lg:col-span-2">
          <h3 class="mb-4 font-semibold text-slate-900">Последняя активность</h3>
          <div class="space-y-1">
            ${db.activities.map(a=>`<div class="flex items-center gap-3 rounded-lg px-2 py-2.5 transition hover:bg-slate-50">
              <div class="flex h-8 w-8 items-center justify-center rounded-full bg-violet-50 text-sm">${notifIcon(a.type)}</div>
              <p class="flex-1 text-sm text-slate-700">${esc(a.text)}</p><span class="text-xs text-slate-400">${timeAgo(a.at)}</span></div>`).join("")}
          </div>
        </div>
        <div class="rounded-2xl border border-slate-100 bg-white p-6 shadow-sm">
          <h3 class="mb-4 font-semibold text-slate-900">Топ клиенты</h3>
          <div class="space-y-3">
            ${topClients.map(({c,total})=>`<div class="flex items-center gap-3">${avatar(c.name,c.avatarColor,36)}
              <div class="min-w-0 flex-1"><p class="truncate text-sm font-medium text-slate-800">${esc(c.name)}</p><p class="truncate text-xs text-slate-400">${esc(c.company)}</p></div>
              <span class="inline-flex items-center rounded-full bg-emerald-50 px-2.5 py-0.5 text-xs font-medium text-emerald-700">${fmtMoney(total)}</span></div>`).join("")}
          </div>
        </div>
      </div>
    </div>`;

  const fStages = STAGES.filter(s=>s.id!=="won"&&s.id!=="lost");
  revenueChart = new Chart(document.getElementById("revChart"),{
    type:"line",
    data:{ labels:revenueData.map(r=>r[0]), datasets:[{ data:revenueData.map(r=>r[1]), borderColor:"#7c3aed", backgroundColor:"rgba(124,58,237,.12)", borderWidth:2.5, fill:true, tension:.4, pointRadius:0 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ y:{ grid:{color:"#f1f5f9"}, ticks:{color:"#94a3b8"} }, x:{ grid:{display:false}, ticks:{color:"#94a3b8"} } } }
  });
  funnelChart = new Chart(document.getElementById("funnelChart"),{
    type:"bar",
    data:{ labels:fStages.map(s=>s.label), datasets:[{ data:fStages.map(s=>db.deals.filter(d=>d.stage===s.id).reduce((sum,d)=>sum+d.amount,0)/1000), backgroundColor:fStages.map(s=>s.color), borderRadius:6 }] },
    options:{ indexAxis:"y", responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>c.parsed.x+" тыс. ₽"}}}, scales:{ x:{display:false}, y:{ grid:{display:false}, ticks:{color:"#64748b", font:{size:11}} } } }
  });
}

/* ============ КЛИЕНТЫ ============ */
const STATUS = { active:{label:"Активный",cls:"bg-emerald-50 text-emerald-700"}, lead:{label:"Лид",cls:"bg-amber-50 text-amber-700"}, inactive:{label:"Неактивный",cls:"bg-slate-100 text-slate-500"} };
function renderCustomers(){
  const list = db.customers.filter(c=>{
    const mq = (c.name+" "+c.company+" "+c.email).toLowerCase().includes(custQuery.toLowerCase());
    const mf = custFilter==="all"||c.status===custFilter; return mq&&mf;
  });
  const fbtn=(k,l)=>`<button onclick="setCustFilter('${k}')" class="rounded-md px-3 py-1.5 text-sm font-medium transition ${custFilter===k?'bg-violet-600 text-white':'text-slate-600 hover:bg-slate-50'}">${l}</button>`;
  document.getElementById("main").innerHTML = `
    <div class="space-y-5">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <div class="relative w-full sm:max-w-xs">
          <svg class="absolute left-3 top-2.5 h-4 w-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="custSearch" value="${esc(custQuery)}" oninput="custQuery=this.value;renderCustomers();document.getElementById('custSearch').focus()" placeholder="Поиск клиентов..." class="${INPUT} pl-9"/>
        </div>
        <div class="flex items-center gap-2">
          <div class="flex rounded-lg border border-slate-200 bg-white p-0.5">${fbtn("all","Все")}${fbtn("active","Активные")}${fbtn("lead","Лиды")}</div>
          <button onclick="customerForm()" class="inline-flex items-center justify-center gap-2 rounded-lg bg-gradient-to-br from-violet-600 to-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm shadow-indigo-200 transition hover:from-violet-700 hover:to-indigo-700">＋ Клиент</button>
        </div>
      </div>
      <div class="overflow-hidden rounded-2xl border border-slate-100 bg-white shadow-sm"><div class="overflow-x-auto"><table class="w-full text-left text-sm">
        <thead><tr class="border-b border-slate-100 text-xs uppercase tracking-wide text-slate-400">
          <th class="px-5 py-3 font-medium">Клиент</th><th class="px-5 py-3 font-medium">Контакты</th><th class="px-5 py-3 font-medium">Статус</th><th class="px-5 py-3 font-medium">Сделки</th><th class="px-5 py-3 font-medium">Добавлен</th><th class="px-5 py-3"></th>
        </tr></thead><tbody>
        ${list.map(c=>{
          const deals=db.deals.filter(d=>d.customerId===c.id);
          const total=deals.filter(d=>d.stage==="won").reduce((s,d)=>s+d.amount,0);
          return `<tr class="border-b border-slate-50 transition last:border-0 hover:bg-slate-50/60">
            <td class="px-5 py-3"><div class="flex items-center gap-3">${avatar(c.name,c.avatarColor)}<div><div class="font-medium text-slate-800">${esc(c.name)}</div><div class="text-xs text-slate-400">${esc(c.company)}</div></div></div></td>
            <td class="px-5 py-3"><div class="text-slate-700">${esc(c.email)}</div><div class="text-xs text-slate-400">${esc(c.phone)}</div></td>
            <td class="px-5 py-3"><span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium ${STATUS[c.status].cls}">${STATUS[c.status].label}</span></td>
            <td class="px-5 py-3"><div class="font-medium text-slate-800">${fmtMoney(total)}</div><div class="text-xs text-slate-400">${deals.length} сделок</div></td>
            <td class="px-5 py-3 text-slate-500">${fmtDate(new Date(c.createdAt).toISOString())}</td>
            <td class="px-5 py-3"><div class="flex items-center justify-end gap-1">
              <button onclick="customerForm('${c.id}')" class="rounded-lg p-1.5 text-slate-400 transition hover:bg-violet-50 hover:text-violet-600"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
              <button onclick="deleteCustomer('${c.id}')" class="rounded-lg p-1.5 text-slate-400 transition hover:bg-rose-50 hover:text-rose-500"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
            </div></td></tr>`;
        }).join("")}
        ${list.length===0?'<tr><td colspan="6" class="px-5 py-10 text-center text-slate-400">Клиенты не найдены</td></tr>':''}
        </tbody></table></div></div>
    </div>`;
}
function setCustFilter(k){ custFilter=k; renderCustomers(); }
function customerForm(id){
  const c = id?cust(id):null;
  const opt=(v,l,sel)=>`<option value="${v}" ${sel?'selected':''}>${l}</option>`;
  openModal(c?"Редактировать клиента":"Новый клиент", `
    <div class="space-y-4">
      ${field("Имя *",`<input id="f_name" class="${INPUT}" value="${c?esc(c.name):''}"/>`)}
      <div class="grid grid-cols-2 gap-4">
        ${field("Компания",`<input id="f_company" class="${INPUT}" value="${c?esc(c.company):''}"/>`)}
        ${field("Статус",`<select id="f_status" class="${INPUT}">${opt("lead","Лид",c&&c.status==="lead")}${opt("active","Активный",c&&c.status==="active")}${opt("inactive","Неактивный",c&&c.status==="inactive")}</select>`)}
      </div>
      <div class="grid grid-cols-2 gap-4">
        ${field("Email",`<input id="f_email" class="${INPUT}" value="${c?esc(c.email):''}"/>`)}
        ${field("Телефон",`<input id="f_phone" class="${INPUT}" value="${c?esc(c.phone):''}"/>`)}
      </div>
      ${field("Теги (через запятую)",`<input id="f_tags" class="${INPUT}" value="${c?esc(c.tags.join(', ')):''}"/>`)}
      <div class="flex justify-end gap-2 pt-2">
        <button onclick="closeModal()" class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50">Отмена</button>
        <button onclick="saveCustomer('${id||''}')" class="rounded-lg bg-gradient-to-br from-violet-600 to-indigo-600 px-4 py-2 text-sm font-medium text-white transition hover:from-violet-700 hover:to-indigo-700">${c?'Сохранить':'Создать'}</button>
      </div>
    </div>`);
}
function saveCustomer(id){
  const name=val("f_name").trim(); if(!name) return;
  const data={ name, company:val("f_company"), email:val("f_email"), phone:val("f_phone"), status:val("f_status"), tags:val("f_tags").split(",").map(t=>t.trim()).filter(Boolean) };
  if(id){ db.customers = db.customers.map(c=>c.id===id?{...c,...data}:c); }
  else { db.customers.unshift({ ...data, id:uid(), createdAt:Date.now(), avatarColor:COLORS[Math.floor(Math.random()*COLORS.length)] }); addActivity("customer","Добавлен новый клиент: "+name); }
  save(); closeModal(); render();
}
function deleteCustomer(id){ db.customers=db.customers.filter(c=>c.id!==id); db.deals=db.deals.filter(d=>d.customerId!==id); save(); render(); }

/* ============ СДЕЛКИ (КАНБАН) ============ */
function renderDeals(){
  document.getElementById("main").innerHTML = `
    <div class="space-y-5">
      <div class="flex items-center justify-between">
        <p class="text-sm text-slate-500">Перетаскивайте карточки между этапами</p>
        <button onclick="dealForm()" class="inline-flex items-center justify-center gap-2 rounded-lg bg-gradient-to-br from-violet-600 to-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm shadow-indigo-200 transition hover:from-violet-700 hover:to-indigo-700">＋ Сделка</button>
      </div>
      <div class="flex gap-4 overflow-x-auto pb-4">
        ${STAGES.map(stage=>{
          const deals=db.deals.filter(d=>d.stage===stage.id);
          const sum=deals.reduce((s,d)=>s+d.amount,0);
          return `<div class="flex w-72 shrink-0 flex-col rounded-2xl border border-slate-100 bg-slate-50/60 p-3" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="dropDeal(event,'${stage.id}',this)">
            <div class="mb-3 flex items-center justify-between px-1"><div class="flex items-center gap-2">
              <span class="h-2.5 w-2.5 rounded-full" style="background:${stage.color}"></span>
              <span class="text-sm font-semibold text-slate-700">${stage.label}</span>
              <span class="rounded-full bg-white px-1.5 text-xs font-medium text-slate-400">${deals.length}</span>
            </div></div>
            <div class="mb-3 px-1 text-xs font-medium text-slate-400">${fmtMoney(sum)}</div>
            <div class="flex flex-1 flex-col gap-2">
              ${deals.map(d=>{ const c=cust(d.customerId); return `
                <div draggable="true" ondragstart="dragId='${d.id}'" ondragend="dragId=null" class="group rounded-xl border border-slate-100 bg-white p-3 shadow-sm transition hover:shadow-md">
                  <div class="flex items-start justify-between gap-2">
                    <p class="text-sm font-medium leading-snug text-slate-800">${esc(d.title)}</p>
                    <div class="flex shrink-0 items-center gap-1 opacity-0 transition group-hover:opacity-100">
                      <button onclick="dealForm('${d.id}')" class="text-slate-300 hover:text-violet-600"><svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
                      <button onclick="deleteDeal('${d.id}')" class="text-slate-300 hover:text-rose-500"><svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
                    </div>
                  </div>
                  <p class="mt-1.5 text-base font-bold text-violet-600">${fmtMoney(d.amount)}</p>
                  <div class="mt-3 flex items-center justify-between">
                    ${c?`<div class="flex items-center gap-1.5">${avatar(c.name,c.avatarColor,22)}<span class="text-xs text-slate-500">${esc(c.company)}</span></div>`:''}
                    <span class="text-xs text-slate-400">${fmtDate(d.closeDate)}</span>
                  </div>
                  <div class="mt-2.5 h-1.5 overflow-hidden rounded-full bg-slate-100"><div class="h-full rounded-full" style="width:${d.probability}%;background:${stage.color}"></div></div>
                </div>`; }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
}
function dropDeal(e,stageId,el){ e.preventDefault(); el.classList.remove("drag-over"); if(dragId){ const prev=db.deals.find(d=>d.id===dragId); db.deals=db.deals.map(d=>d.id===dragId?{...d,stage:stageId}:d); if(prev&&prev.stage!==stageId) addActivity("deal","Сделка «"+prev.title+"» перешла на этап"); save(); render(); } dragId=null; }
function dealForm(id){
  const d=id?db.deals.find(x=>x.id===id):null;
  const custOpts=db.customers.map(c=>`<option value="${c.id}" ${d&&d.customerId===c.id?'selected':''}>${esc(c.name)}</option>`).join("");
  const stageOpts=STAGES.map(s=>`<option value="${s.id}" ${d&&d.stage===s.id?'selected':''}>${s.label}</option>`).join("");
  openModal(d?"Редактировать сделку":"Новая сделка", `
    <div class="space-y-4">
      ${field("Название *",`<input id="f_title" class="${INPUT}" value="${d?esc(d.title):''}"/>`)}
      <div class="grid grid-cols-2 gap-4">
        ${field("Клиент",`<select id="f_cust" class="${INPUT}">${custOpts}</select>`)}
        ${field("Сумма, ₽",`<input id="f_amount" type="number" class="${INPUT}" value="${d?d.amount:''}"/>`)}
      </div>
      <div class="grid grid-cols-3 gap-4">
        ${field("Этап",`<select id="f_stage" class="${INPUT}">${stageOpts}</select>`)}
        ${field("Вероятность %",`<input id="f_prob" type="number" class="${INPUT}" value="${d?d.probability:20}"/>`)}
        ${field("Дата закрытия",`<input id="f_date" type="date" class="${INPUT}" value="${d?d.closeDate:''}"/>`)}
      </div>
      <div class="flex justify-end gap-2 pt-2">
        <button onclick="closeModal()" class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50">Отмена</button>
        <button onclick="saveDeal('${id||''}')" class="rounded-lg bg-gradient-to-br from-violet-600 to-indigo-600 px-4 py-2 text-sm font-medium text-white transition hover:from-violet-700 hover:to-indigo-700">${d?'Сохранить':'Создать'}</button>
      </div>
    </div>`);
}
function saveDeal(id){
  const title=val("f_title").trim(); if(!title) return;
  const data={ title, customerId:val("f_cust"), amount:Number(val("f_amount"))||0, stage:val("f_stage"), probability:Number(val("f_prob"))||0, closeDate:val("f_date")||new Date().toISOString().slice(0,10) };
  if(id){ db.deals=db.deals.map(d=>d.id===id?{...d,...data}:d); }
  else { db.deals.unshift({ ...data, id:uid(), createdAt:Date.now() }); addActivity("deal","Создана сделка «"+title+"»"); }
  save(); closeModal(); render();
}
function deleteDeal(id){ db.deals=db.deals.filter(d=>d.id!==id); save(); render(); }

/* ============ ЗАДАЧИ ============ */
const PRIO = { high:{label:"Высокий",cls:"bg-rose-50 text-rose-600"}, medium:{label:"Средний",cls:"bg-amber-50 text-amber-700"}, low:{label:"Низкий",cls:"bg-sky-50 text-sky-600"} };
function renderTasks(){
  const list=db.tasks.filter(t=>taskTab==="open"?!t.done:t.done);
  const tbtn=(k,l)=>`<button onclick="taskTab='${k}';renderTasks()" class="rounded-md px-3 py-1.5 text-sm font-medium transition ${taskTab===k?'bg-violet-600 text-white':'text-slate-600 hover:bg-slate-50'}">${l}</button>`;
  document.getElementById("main").innerHTML = `
    <div class="space-y-5">
      <div class="flex items-center justify-between">
        <div class="flex rounded-lg border border-slate-200 bg-white p-0.5">${tbtn("open","Активные ("+db.tasks.filter(t=>!t.done).length+")")}${tbtn("done","Выполненные")}</div>
        <button onclick="taskForm()" class="inline-flex items-center justify-center gap-2 rounded-lg bg-gradient-to-br from-violet-600 to-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm shadow-indigo-200 transition hover:from-violet-700 hover:to-indigo-700">＋ Задача</button>
      </div>
      <div class="space-y-2">
        ${list.map(t=>{ const c=cust(t.customerId); const overdue=!t.done&&new Date(t.dueDate)<new Date(new Date().toDateString()); return `
          <div class="flex items-center gap-4 rounded-xl border border-slate-100 bg-white p-4 shadow-sm transition hover:shadow-md">
            <button onclick="toggleTask('${t.id}')" class="flex h-5 w-5 shrink-0 items-center justify-center rounded-md border-2 transition ${t.done?'border-violet-600 bg-violet-600':'border-slate-300 hover:border-violet-400'}">${t.done?'<svg class="h-3 w-3 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>':''}</button>
            <div class="min-w-0 flex-1">
              <p class="text-sm font-medium ${t.done?'text-slate-400 line-through':'text-slate-800'}">${esc(t.title)}</p>
              <div class="mt-1 flex flex-wrap items-center gap-2 text-xs text-slate-400">
                <span class="${overdue?'font-medium text-rose-500':''}">📅 ${fmtDate(t.dueDate)}</span>
                ${c?`<span class="flex items-center gap-1">• ${avatar(c.name,c.avatarColor,16)} ${esc(c.name)}</span>`:''}
              </div>
            </div>
            <span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium ${PRIO[t.priority].cls}">${PRIO[t.priority].label}</span>
            <button onclick="taskForm('${t.id}')" class="rounded-lg p-1.5 text-slate-300 transition hover:bg-violet-50 hover:text-violet-600"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
            <button onclick="deleteTask('${t.id}')" class="rounded-lg p-1.5 text-slate-300 transition hover:bg-rose-50 hover:text-rose-500"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
          </div>`; }).join("")}
        ${list.length===0?'<div class="rounded-xl border border-dashed border-slate-200 py-12 text-center text-slate-400">Нет задач</div>':''}
      </div>
    </div>`;
}
function toggleTask(id){ db.tasks=db.tasks.map(t=>t.id===id?{...t,done:!t.done}:t); const t=db.tasks.find(x=>x.id===id); if(t.done) addActivity("task","Задача «"+t.title+"» выполнена"); save(); render(); }
function taskForm(id){
  const t=id?db.tasks.find(x=>x.id===id):null;
  const custOpts='<option value="">— без клиента —</option>'+db.customers.map(c=>`<option value="${c.id}" ${t&&t.customerId===c.id?'selected':''}>${esc(c.name)}</option>`).join("");
  const opt=(v,l,sel)=>`<option value="${v}" ${sel?'selected':''}>${l}</option>`;
  openModal(t?"Редактировать задачу":"Новая задача", `
    <div class="space-y-4">
      ${field("Описание *",`<input id="f_title" class="${INPUT}" value="${t?esc(t.title):''}"/>`)}
      <div class="grid grid-cols-2 gap-4">
        ${field("Клиент",`<select id="f_cust" class="${INPUT}">${custOpts}</select>`)}
        ${field("Приоритет",`<select id="f_prio" class="${INPUT}">${opt("high","Высокий",t&&t.priority==="high")}${opt("medium","Средний",!t||t.priority==="medium")}${opt("low","Низкий",t&&t.priority==="low")}</select>`)}
      </div>
      ${field("Срок",`<input id="f_date" type="date" class="${INPUT}" value="${t?t.dueDate:''}"/>`)}
      <div class="flex justify-end gap-2 pt-2">
        <button onclick="closeModal()" class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50">Отмена</button>
        <button onclick="saveTask('${id||''}')" class="rounded-lg bg-gradient-to-br from-violet-600 to-indigo-600 px-4 py-2 text-sm font-medium text-white transition hover:from-violet-700 hover:to-indigo-700">${t?'Сохранить':'Добавить'}</button>
      </div>
    </div>`);
}
function saveTask(id){
  const title=val("f_title").trim(); if(!title) return;
  const data={ title, customerId:val("f_cust")||undefined, dueDate:val("f_date")||new Date().toISOString().slice(0,10), priority:val("f_prio") };
  if(id){ db.tasks=db.tasks.map(t=>t.id===id?{...t,...data}:t); }
  else { db.tasks.unshift({ ...data, id:uid(), createdAt:Date.now(), done:false }); }
  save(); closeModal(); render();
}
function deleteTask(id){ db.tasks=db.tasks.filter(t=>t.id!==id); save(); render(); }

/* ============ РЕНДЕР ============ */
function render(){
  if(revenueChart){ revenueChart.destroy(); revenueChart=null; }
  if(funnelChart){ funnelChart.destroy(); funnelChart=null; }
  document.getElementById("pageTitle").textContent = TITLES[page];
  renderNav(); renderNotifBadge();
  if(page==="dashboard") renderDashboard();
  else if(page==="customers") renderCustomers();
  else if(page==="deals") renderDeals();
  else if(page==="tasks") renderTasks();
}
load(); render();
</script>
</body>
</html>
